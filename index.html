<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Rarity Scorer</title>
<style>
  :root, [data-theme="dark"] {
    --orange: #ff8c00;
    --purple: #9b59b6;
    --blue: #3498db;
    --common: #95a5a6;
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --panel-bg: #1a2340;
    --text: #e0e0e0;
    --text-muted: #8899aa;
    --border: #2a3a5e;
    --accent: #3498db;
    --danger: #e74c3c;
    --success: #2ecc71;
    --bargain-border: rgba(46,204,113,0.5);
    --bargain-bg: rgba(46,204,113,0.04);
    --sticky-bg: #1a1a2eee;
    --table-hover: rgba(52,152,219,0.08);
    --score-high: #2ecc71;
    --score-mid: #f1c40f;
    --score-low: #e74c3c;
  }
  [data-theme="light"] {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --panel-bg: #f8f9fa;
    --text: #1a1a2e;
    --text-muted: #6b7b8d;
    --border: #d0d7de;
    --accent: #2980b9;
    --danger: #c0392b;
    --success: #27ae60;
    --bargain-border: rgba(39,174,96,0.5);
    --bargain-bg: rgba(39,174,96,0.04);
    --sticky-bg: #f0f2f5ee;
    --table-hover: rgba(52,152,219,0.06);
    --score-high: #27ae60;
    --score-mid: #d4ac0d;
    --score-low: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }

  /* Header */
  .app-header { text-align: center; padding: 20px 20px 8px; position: relative; }
  .app-header h1 { font-size: 1.6rem; margin-bottom: 4px; }
  .app-header .subtitle { color: var(--text-muted); font-size: 0.82rem; }
  .theme-toggle {
    position: absolute; top: 20px; right: 20px; background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* Panels */
  .panel {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px; margin: 10px auto; max-width: 960px; transition: background 0.3s, border-color 0.3s;
  }
  .panel-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); margin-bottom: 12px; font-weight: 600;
  }

  /* Form elements */
  .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .form-group label { font-size: 0.78rem; color: var(--text-muted); }
  .form-group input, .form-group select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-size: 0.88rem;
    outline: none; transition: border-color 0.2s, background 0.3s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text-muted); opacity: 0.6; }
  .form-group.wide { flex: 3; min-width: 300px; }

  /* API key */
  .api-key-row { display: flex; gap: 8px; align-items: flex-end; }
  .api-key-row .form-group { flex: 1; }
  .api-key-row .key-status { font-size: 0.75rem; padding: 9px 12px; border-radius: 6px; white-space: nowrap; }
  .key-saved { color: var(--success); }
  .key-missing { color: var(--danger); }

  /* Tier config */
  .tier-config { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .tier-group {
    display: flex; align-items: center; gap: 6px; padding: 8px 12px;
    border-radius: 8px; border: 1px solid;
  }
  .tier-group input {
    width: 50px; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 4px 6px; border-radius: 4px; font-size: 0.85rem; text-align: center;
  }
  .tier-group input:focus { border-color: var(--accent); outline: none; }
  .tier-group .tier-label { font-size: 0.82rem; font-weight: 600; }
  .tier-group .tier-sep { font-size: 0.75rem; color: var(--text-muted); }
  .tier-orange { border-color: rgba(255,140,0,0.4); background: rgba(255,140,0,0.08); }
  .tier-orange .tier-label { color: var(--orange); }
  .tier-purple { border-color: rgba(155,89,182,0.4); background: rgba(155,89,182,0.08); }
  .tier-purple .tier-label { color: var(--purple); }
  .tier-blue { border-color: rgba(52,152,219,0.4); background: rgba(52,152,219,0.08); }
  .tier-blue .tier-label { color: var(--blue); }

  /* Mode toggle */
  .mode-toggle { display: flex; gap: 0; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .mode-btn {
    padding: 8px 20px; background: var(--bg); color: var(--text-muted);
    border: none; cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
  }
  .mode-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
  .mode-btn:hover:not(.active) { background: var(--panel-bg); }

  /* Buttons */
  .btn { border: none; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn-analyze { background: linear-gradient(135deg, var(--accent), #2980b9); color: #fff; padding: 10px 32px; border-radius: 8px; font-size: 1rem; letter-spacing: 0.5px; }
  .btn-analyze:hover { opacity: 0.9; }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-cancel { background: linear-gradient(135deg, var(--danger), #c0392b); color: #fff; }
  .btn-secondary { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); }

  /* Progress */
  .progress-container { display: none; margin: 14px auto; max-width: 960px; }
  .progress-container.visible { display: block; }
  .progress-bar-bg { background: var(--bg); border-radius: 8px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 8px; transition: width 0.3s ease; width: 0%; }
  .progress-text { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; text-align: center; }

  /* Error */
  .error-msg { background: rgba(231,76,60,0.12); border: 1px solid var(--danger); color: var(--danger); padding: 12px 16px; border-radius: 8px; margin: 12px auto; max-width: 960px; font-size: 0.88rem; display: none; }
  .error-msg.visible { display: block; }

  /* Collection info */
  .collection-info { display: none; align-items: center; gap: 14px; margin: 14px auto; max-width: 960px; padding: 12px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; }
  .collection-info.visible { display: flex; }
  .collection-info img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; }
  .collection-info .col-name { font-size: 1.1rem; font-weight: 700; }
  .collection-info .col-meta { font-size: 0.78rem; color: var(--text-muted); }

  /* Sticky results header */
  .results-header {
    display: none; position: sticky; top: 0; z-index: 20;
    background: var(--sticky-bg); backdrop-filter: blur(10px);
    padding: 12px 0 8px; margin: 0 auto; max-width: 960px;
  }
  .results-header.visible { display: block; }

  .stats-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .stat { text-align: center; padding: 4px 16px; }
  .stat .num { font-size: 1.3rem; font-weight: 700; }
  .stat .lbl { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; }

  .controls-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .sort-btn {
    background: var(--card-bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s;
  }
  .sort-btn:hover { border-color: var(--accent); }
  .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .view-toggle { display: flex; gap: 0; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); margin-left: 8px; }
  .view-btn { padding: 5px 10px; background: var(--bg); color: var(--text-muted); border: none; cursor: pointer; font-size: 0.78rem; }
  .view-btn.active { background: var(--accent); color: #fff; }

  /* Results grid (card view) */
  .results-grid { display: flex; flex-direction: column; gap: 12px; max-width: 960px; margin: 8px auto; padding: 0 0 40px; }

  /* Item cards */
  .item-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; transition: border-color 0.2s, background 0.3s;
  }
  .item-card:hover { border-color: var(--accent); }
  .item-card.bargain { border-color: var(--bargain-border); background: var(--bargain-bg); }
  .item-card.bargain::before { content: ''; }
  .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .item-name { font-size: 1rem; font-weight: 700; }
  .item-badges { display: flex; gap: 6px; margin-top: 2px; }
  .badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-bargain { background: rgba(46,204,113,0.15); color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
  .item-rank { font-size: 0.75rem; color: var(--text-muted); }
  .item-price { font-size: 0.85rem; color: var(--text-muted); }
  .item-price .eth { color: var(--text); font-weight: 600; }
  .item-score { font-size: 1.4rem; font-weight: 800; text-align: right; min-width: 70px; }
  .score-breakdown { font-size: 0.65rem; color: var(--text-muted); white-space: nowrap; }
  .value-ratio { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

  .traits-section { margin-top: 6px; }
  .traits-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
  .traits-grid { display: flex; flex-wrap: wrap; gap: 4px; }

  .trait-tag { display: inline-flex; flex-direction: column; padding: 3px 8px; border-radius: 5px; font-size: 0.72rem; line-height: 1.3; border: 1px solid; }
  .trait-tag .trait-type { font-size: 0.6rem; opacity: 0.7; }
  .trait-tag .trait-value { font-weight: 600; }
  .trait-tag .trait-pct { font-size: 0.55rem; opacity: 0.6; }
  .trait-orange { background: rgba(255,140,0,0.12); color: var(--orange); border-color: rgba(255,140,0,0.3); }
  .trait-purple { background: rgba(155,89,182,0.12); color: var(--purple); border-color: rgba(155,89,182,0.3); }
  .trait-blue { background: rgba(52,152,219,0.12); color: var(--blue); border-color: rgba(52,152,219,0.3); }
  .trait-common { background: rgba(149,165,166,0.06); color: var(--common); border-color: rgba(149,165,166,0.15); }

  .special-traits { margin-top: 5px; }
  .special-toggle { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 0.68rem; }
  .special-toggle:hover { border-color: var(--accent); color: var(--text); }
  .special-content { display: none; margin-top: 5px; }
  .special-content.open { display: flex; flex-wrap: wrap; gap: 4px; }

  .opensea-link { display: inline-block; margin-top: 5px; font-size: 0.75rem; color: var(--accent); text-decoration: none; }
  .opensea-link:hover { text-decoration: underline; }

  /* Compact table view */
  .results-table { display: none; max-width: 960px; margin: 8px auto; padding: 0 0 40px; }
  .results-table.visible { display: block; }
  .results-table table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .results-table th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; white-space: nowrap; }
  .results-table th:hover { color: var(--accent); }
  .results-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .results-table tr:hover td { background: var(--table-hover); }
  .results-table .score-cell { font-weight: 700; font-size: 0.95rem; }
  .results-table .price-cell { font-weight: 600; }
  .results-table .tier-dots { display: flex; gap: 4px; }
  .results-table .tier-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .results-table .bargain-row td { background: var(--bargain-bg); }
  .results-table a { color: var(--accent); text-decoration: none; }
  .results-table a:hover { text-decoration: underline; }
  .results-table .expandable { cursor: pointer; }
  .results-table .expand-row { display: none; }
  .results-table .expand-row.open { display: table-row; }
  .results-table .expand-cell { padding: 10px; }

  @media (max-width: 640px) {
    .form-row { flex-direction: column; }
    .form-group.wide { min-width: 100%; }
    .tier-config { flex-direction: column; }
    .item-header { flex-direction: column; }
    .item-score { text-align: left; }
    .theme-toggle { top: 12px; right: 12px; }
    .results-table { overflow-x: auto; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>NFT Rarity Scorer</h1>
  <div class="subtitle">Score NFT traits by rarity tiers. Data from OpenSea. Runs entirely in your browser.</div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9790;</button>
</div>

<!-- API Key -->
<div class="panel">
  <div class="panel-title">API Key</div>
  <div class="api-key-row">
    <div class="form-group">
      <input type="password" id="apiKey" placeholder="Enter your OpenSea API key" autocomplete="off">
    </div>
    <button class="btn btn-analyze" style="padding:8px 16px; font-size:0.85rem;" onclick="saveApiKey()">Save</button>
    <span id="keyStatus" class="key-status"></span>
  </div>
</div>

<!-- Query -->
<div class="panel">
  <div class="panel-title">Collection</div>
  <div class="form-row" style="margin-bottom: 12px;">
    <div class="form-group wide">
      <label>OpenSea Collection URL or Slug</label>
      <input type="text" id="collectionInput" placeholder="https://opensea.io/collection/your-collection or just the-slug">
    </div>
    <div class="form-group" style="flex: 0 0 auto;">
      <label>Mode</label>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="listed" onclick="setMode('listed')">Listed</button>
        <button class="mode-btn" data-mode="all" onclick="setMode('all')">All</button>
      </div>
    </div>
  </div>
</div>

<!-- Scoring Config -->
<div class="panel">
  <div class="panel-title">Scoring Tiers</div>
  <div class="tier-config">
    <div class="tier-group tier-orange">
      <span class="tier-label">Orange</span>
      <span class="tier-sep">&lt;</span>
      <input type="number" id="thresh1" value="2" min="0" max="100" step="0.5">
      <span class="tier-sep">% &rarr;</span>
      <input type="number" id="points1" value="7" min="0" max="100">
      <span class="tier-sep">pts</span>
    </div>
    <div class="tier-group tier-purple">
      <span class="tier-label">Purple</span>
      <input type="number" id="thresh1_upper" value="2" min="0" max="100" step="0.5" disabled style="width:40px; opacity:0.5;">
      <span class="tier-sep">&ndash;</span>
      <input type="number" id="thresh2" value="5" min="0" max="100" step="0.5">
      <span class="tier-sep">% &rarr;</span>
      <input type="number" id="points2" value="3" min="0" max="100">
      <span class="tier-sep">pts</span>
    </div>
    <div class="tier-group tier-blue">
      <span class="tier-label">Blue</span>
      <input type="number" id="thresh2_upper" value="5" min="0" max="100" step="0.5" disabled style="width:40px; opacity:0.5;">
      <span class="tier-sep">&ndash;</span>
      <input type="number" id="thresh3" value="20" min="0" max="100" step="0.5">
      <span class="tier-sep">% &rarr;</span>
      <input type="number" id="points3" value="1" min="0" max="100">
      <span class="tier-sep">pts</span>
    </div>
  </div>
  <div style="margin-top: 16px; text-align: center; display: flex; gap: 10px; justify-content: center;">
    <button class="btn btn-analyze" id="analyzeBtn" onclick="analyze()">Analyze Collection</button>
    <button class="btn btn-cancel" id="cancelBtn" onclick="cancelAnalysis()" style="display: none;">Cancel</button>
  </div>
</div>

<!-- Progress -->
<div class="progress-container" id="progress">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">Preparing...</div>
</div>

<!-- Error -->
<div class="error-msg" id="errorMsg"></div>

<!-- Collection Info -->
<div class="collection-info" id="collectionInfo">
  <img id="colImage" src="" alt="">
  <div>
    <div class="col-name" id="colName"></div>
    <div class="col-meta" id="colMeta"></div>
  </div>
</div>

<!-- Sticky results header -->
<div class="results-header" id="resultsHeader">
  <div class="stats-bar" id="statsBar">
    <div class="stat"><div class="num" id="statCount">0</div><div class="lbl" id="statCountLabel">Items</div></div>
    <div class="stat"><div class="num" id="statTop">0</div><div class="lbl">Top Score</div></div>
    <div class="stat"><div class="num" id="statAvg">0</div><div class="lbl">Avg Score</div></div>
    <div class="stat"><div class="num" id="statLow">0</div><div class="lbl">Low Score</div></div>
    <div class="stat"><div class="num" id="statSupply">0</div><div class="lbl">Total Supply</div></div>
  </div>
  <div class="controls-row">
    <button class="sort-btn active" data-sort="score" onclick="sortResults('score')">Score</button>
    <button class="sort-btn" data-sort="value" onclick="sortResults('value')">Value</button>
    <button class="sort-btn" data-sort="price" onclick="sortResults('price')">Price</button>
    <button class="sort-btn" data-sort="rarity" onclick="sortResults('rarity')">OS Rarity</button>
    <button class="sort-btn" data-sort="toggle" onclick="toggleSortDir()">&#8597;</button>
    <div class="view-toggle">
      <button class="view-btn active" data-view="cards" onclick="setView('cards')">Cards</button>
      <button class="view-btn" data-view="table" onclick="setView('table')">Table</button>
    </div>
    <button class="btn btn-secondary" onclick="exportCSV()" style="font-size:0.78rem; padding:5px 12px;">CSV</button>
  </div>
</div>

<!-- Results: Card view -->
<div class="results-grid" id="resultsGrid"></div>

<!-- Results: Table view -->
<div class="results-table" id="resultsTable"></div>

<script>
// ─── State ───
let currentMode = 'listed';
let currentSort = 'score';
let currentSortDir = 'desc';
let currentView = 'cards';
let scoredItems = [];
let abortController = null;
let isRunning = false;
let lastColData = null;
let lastChain = '';
let lastContract = '';
let lastThresholds = [];
let lastPoints = [];

// ─── Theme ───
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('nft_scorer_theme', next);
  document.getElementById('themeToggle').innerHTML = next === 'dark' ? '&#9790;' : '&#9788;';
}
function loadTheme() {
  const saved = localStorage.getItem('nft_scorer_theme') || 'dark';
  document.documentElement.dataset.theme = saved;
  document.getElementById('themeToggle').innerHTML = saved === 'dark' ? '&#9790;' : '&#9788;';
}

// ─── API Key ───
function loadApiKey() {
  const key = localStorage.getItem('opensea_api_key') || '';
  document.getElementById('apiKey').value = key;
  updateKeyStatus();
}
function saveApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (key) { localStorage.setItem('opensea_api_key', key); updateKeyStatus(); }
}
function updateKeyStatus() {
  const el = document.getElementById('keyStatus');
  const key = localStorage.getItem('opensea_api_key');
  el.textContent = key ? 'Key saved' : 'No key saved';
  el.className = 'key-status ' + (key ? 'key-saved' : 'key-missing');
}
function getApiKey() {
  return document.getElementById('apiKey').value.trim() || localStorage.getItem('opensea_api_key') || '';
}

// ─── Last collection ───
function loadLastCollection() {
  const last = localStorage.getItem('nft_scorer_last_collection');
  if (last) document.getElementById('collectionInput').value = last;
}
function saveLastCollection(slug) {
  localStorage.setItem('nft_scorer_last_collection', slug);
}

// ─── Mode / View ───
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}
function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('resultsGrid').style.display = view === 'cards' ? 'flex' : 'none';
  document.getElementById('resultsTable').className = 'results-table' + (view === 'table' ? ' visible' : '');
}

// ─── Tier sync ───
document.getElementById('thresh1').addEventListener('input', function() { document.getElementById('thresh1_upper').value = this.value; });
document.getElementById('thresh2').addEventListener('input', function() { document.getElementById('thresh2_upper').value = this.value; });

// ─── Helpers ───
function parseSlug(input) {
  input = input.trim();
  const match = input.match(/opensea\.io\/collection\/([a-z0-9_-]+)/i);
  if (match) return match[1].toLowerCase();
  if (/^[a-z0-9_-]+$/i.test(input)) return input.toLowerCase();
  return null;
}
function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('visible'); }
function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }

let progressStartTime = 0;
function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  if (pct > 5 && pct < 95) {
    const elapsed = (Date.now() - progressStartTime) / 1000;
    const total = elapsed / (pct / 100);
    const remaining = Math.max(0, Math.round(total - elapsed));
    document.getElementById('progressText').textContent = text + (remaining > 2 ? ` (~${remaining}s remaining)` : '');
  } else {
    document.getElementById('progressText').textContent = text;
  }
}
function showProgress() { document.getElementById('progress').classList.add('visible'); progressStartTime = Date.now(); }
function hideProgress() { document.getElementById('progress').classList.remove('visible'); }

async function apiGet(url, apiKey, retries = 3) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    const res = await fetch(url, {
      headers: { 'X-API-KEY': apiKey, 'Accept': 'application/json' },
      signal: abortController?.signal
    });
    if (res.status === 429 && attempt < retries) {
      const wait = Math.pow(2, attempt + 1) * 1000;
      console.warn(`Rate limited (429), retrying in ${wait}ms...`);
      await sleep(wait);
      continue;
    }
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error(`API ${res.status}: ${body.substring(0, 200)}`);
    }
    return res.json();
  }
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function parsePrice(listing) {
  try {
    const val = listing.price?.current?.value ?? '0';
    const decimals = listing.price?.current?.decimals ?? 18;
    const str = String(val).padStart(decimals + 1, '0');
    const intPart = str.slice(0, -decimals) || '0';
    const fracPart = str.slice(-decimals).replace(/0+$/, '');
    return parseFloat(intPart + (fracPart ? '.' + fracPart : ''));
  } catch (e) { return 0; }
}
function formatPrice(price) {
  if (price == null) return null;
  if (price >= 1) return parseFloat(price.toFixed(4));
  return parseFloat(price.toPrecision(4));
}

function scoreColor(score, min, max) {
  if (max === min) return 'var(--score-mid)';
  const ratio = (score - min) / (max - min);
  if (ratio >= 0.66) return 'var(--score-high)';
  if (ratio >= 0.33) return 'var(--score-mid)';
  return 'var(--score-low)';
}

function cancelAnalysis() {
  if (abortController) abortController.abort();
  isRunning = false;
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('analyzeBtn').textContent = 'Analyze Collection';
  document.getElementById('cancelBtn').style.display = 'none';
  hideProgress();
}

// ─── Main Analysis ───
async function analyze() {
  if (isRunning) return;
  hideError();
  const apiKey = getApiKey();
  if (!apiKey) { showError('Please enter your OpenSea API key first.'); return; }

  const slug = parseSlug(document.getElementById('collectionInput').value);
  if (!slug) { showError('Please enter a valid OpenSea collection URL or slug.'); return; }

  const thresholds = [
    parseFloat(document.getElementById('thresh1').value) || 2,
    parseFloat(document.getElementById('thresh2').value) || 5,
    parseFloat(document.getElementById('thresh3').value) || 20
  ];
  if (thresholds[0] >= thresholds[1] || thresholds[1] >= thresholds[2]) {
    showError('Thresholds must be in ascending order (e.g., 2 < 5 < 20).');
    return;
  }
  const points = [
    Math.max(0, parseInt(document.getElementById('points1').value) || 7),
    Math.max(0, parseInt(document.getElementById('points2').value) || 3),
    Math.max(0, parseInt(document.getElementById('points3').value) || 1)
  ];
  lastThresholds = thresholds;
  lastPoints = points;

  isRunning = true;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  abortController = new AbortController();
  showProgress();
  document.getElementById('resultsGrid').innerHTML = '';
  document.getElementById('resultsTable').innerHTML = '';
  document.getElementById('resultsHeader').classList.remove('visible');
  document.getElementById('collectionInfo').classList.remove('visible');

  try {
    // Step 1: Collection info
    setProgress(5, 'Fetching collection info...');
    const colData = await apiGet(`https://api.opensea.io/api/v2/collections/${slug}`, apiKey);
    lastColData = colData;
    const totalSupply = colData.total_supply || 0;
    const contracts = colData.contracts || [];
    const chain = contracts[0]?.chain || 'ethereum';
    const contractAddress = contracts[0]?.address || '';
    lastChain = chain;
    lastContract = contractAddress;

    if (!totalSupply) throw new Error('Could not determine collection total supply.');
    if (!contractAddress) throw new Error('Could not determine contract address.');

    saveLastCollection(document.getElementById('collectionInput').value.trim());

    // Show collection info
    showCollectionInfo(colData, totalSupply);

    // Step 2: Traits (rarity counts)
    setProgress(10, 'Fetching trait data...');
    let traitCounts = {};
    try {
      const traitData = await apiGet(`https://api.opensea.io/api/v2/collections/${slug}/traits`, apiKey);
      for (const [traitType, values] of Object.entries(traitData)) {
        if (typeof values === 'object' && values !== null) {
          for (const [val, count] of Object.entries(values)) {
            if (typeof count === 'number') traitCounts[`${traitType}::${val}`] = count;
          }
        }
      }
    } catch (e) {
      console.warn('Traits endpoint unavailable, will build from all items:', e.message);
    }

    const hasTraitCounts = Object.keys(traitCounts).length > 0;

    if (!hasTraitCounts) {
      setProgress(15, 'Building trait rarity table from all items...');
      const allNfts = await fetchAllItems(slug, apiKey, totalSupply);
      traitCounts = {};
      for (const nft of allNfts) {
        for (const t of nft.traits) traitCounts[`${t.type}::${t.value}`] = (traitCounts[`${t.type}::${t.value}`] || 0) + 1;
      }
      console.log('Built trait counts from', allNfts.length, 'items,', Object.keys(traitCounts).length, 'unique trait pairs');

      if (currentMode === 'all') {
        setProgress(95, 'Scoring items...');
        scoredItems = allNfts.map(item => scoreItem(item, traitCounts, totalSupply, thresholds, points));
        finishAnalysis(scoredItems, totalSupply, slug, chain, contractAddress, thresholds, points);
        return;
      }
    }

    let items = [];
    if (currentMode === 'listed') {
      setProgress(70, 'Fetching active listings...');
      items = await fetchListedItems(slug, chain, contractAddress, apiKey);
    } else {
      setProgress(70, 'Fetching all items...');
      items = await fetchAllItems(slug, apiKey, totalSupply);
    }

    if (items.length === 0) throw new Error('No items found. The collection may have no active listings.');

    setProgress(95, 'Scoring items...');
    scoredItems = items.map(item => scoreItem(item, traitCounts, totalSupply, thresholds, points));
    finishAnalysis(scoredItems, totalSupply, slug, chain, contractAddress, thresholds, points);

  } catch (e) {
    if (e.name === 'AbortError') showError('Analysis cancelled.');
    else showError(e.message);
  } finally {
    isRunning = false;
    btn.disabled = false;
    btn.textContent = 'Analyze Collection';
    document.getElementById('cancelBtn').style.display = 'none';
    setTimeout(hideProgress, 1000);
  }
}

function finishAnalysis(items, totalSupply, slug, chain, contractAddress, thresholds, points) {
  // Compute value scores and bargain flags
  const scores = items.map(i => i.totalScore);
  const minScore = Math.min(...scores);
  const maxScore = Math.max(...scores);

  // Rank by score and price for bargain detection
  const byScore = [...items].sort((a, b) => b.totalScore - a.totalScore);
  const byPrice = [...items].filter(i => i.price != null).sort((a, b) => a.price - b.price);
  const scoreRankMap = {};
  byScore.forEach((it, i) => scoreRankMap[it.tokenId] = i + 1);
  const priceRankMap = {};
  byPrice.forEach((it, i) => priceRankMap[it.tokenId] = i + 1);

  items.forEach(item => {
    item.valueScore = item.price > 0 ? Math.round(item.totalScore / item.price) : null;
    item.scoreColor = scoreColor(item.totalScore, minScore, maxScore);
    const sr = scoreRankMap[item.tokenId] || items.length;
    const pr = priceRankMap[item.tokenId] || items.length;
    item.isBargain = item.price != null && sr < pr * 0.6;
  });

  items.sort((a, b) => b.totalScore - a.totalScore);
  scoredItems = items;

  setProgress(100, 'Done!');
  renderResults(items, totalSupply, slug, chain, contractAddress, thresholds, points, minScore, maxScore);
}

// ─── Fetch Listed Items ───
async function fetchListedItems(slug, chain, contractAddress, apiKey) {
  let listings = [];
  let next = null;
  let page = 0;
  do {
    const url = next
      ? `https://api.opensea.io/api/v2/listings/collection/${slug}/all?limit=100&next=${next}`
      : `https://api.opensea.io/api/v2/listings/collection/${slug}/all?limit=100`;
    const data = await apiGet(url, apiKey);
    listings = listings.concat(data.listings || []);
    next = data.next || null;
    page++;
    setProgress(25 + Math.min(page * 10, 30), `Fetched ${listings.length} listings...`);
    if (next) await sleep(250);
  } while (next);

  const tokenMap = {};
  for (const listing of listings) {
    const tokenId = listing.protocol_data?.parameters?.offer?.[0]?.identifierOrCriteria;
    if (!tokenId) continue;
    const price = parsePrice(listing);
    const currency = listing.price?.current?.currency || 'ETH';
    if (!tokenMap[tokenId] || price < tokenMap[tokenId].price) tokenMap[tokenId] = { tokenId, price, currency };
  }

  const tokenIds = Object.keys(tokenMap);
  setProgress(55, `Found ${tokenIds.length} unique listed items. Fetching traits...`);

  const items = [];
  const batchSize = 5;
  for (let i = 0; i < tokenIds.length; i += batchSize) {
    const batch = tokenIds.slice(i, i + batchSize);
    const promises = batch.map(async (tokenId) => {
      try {
        const data = await apiGet(`https://api.opensea.io/api/v2/chain/${chain}/contract/${contractAddress}/nfts/${tokenId}`, apiKey);
        const nft = data.nft || {};
        return {
          tokenId, name: nft.name || `#${tokenId}`,
          price: tokenMap[tokenId].price, currency: tokenMap[tokenId].currency,
          rarity: nft.rarity,
          traits: (nft.traits || []).map(t => ({ type: t.trait_type, value: String(t.value) }))
        };
      } catch (e) { console.warn(`Failed to fetch token ${tokenId}:`, e.message); return null; }
    });
    items.push(...(await Promise.all(promises)).filter(Boolean));
    setProgress(55 + Math.round((i / tokenIds.length) * 35), `Fetched traits for ${items.length}/${tokenIds.length} items...`);
    if (i + batchSize < tokenIds.length) await sleep(300);
  }
  return items;
}

// ─── Fetch All Items ───
async function fetchAllItems(slug, apiKey, totalSupply) {
  let items = [];
  let next = null;
  do {
    const url = next
      ? `https://api.opensea.io/api/v2/collection/${slug}/nfts?limit=200&next=${next}`
      : `https://api.opensea.io/api/v2/collection/${slug}/nfts?limit=200`;
    const data = await apiGet(url, apiKey);
    items = items.concat((data.nfts || []).map(nft => ({
      tokenId: nft.identifier, name: nft.name || `#${nft.identifier}`,
      price: null, currency: null, rarity: nft.rarity,
      traits: (nft.traits || []).map(t => ({ type: t.trait_type, value: String(t.value) }))
    })));
    next = data.next || null;
    setProgress(25 + Math.min(Math.round((items.length / totalSupply) * 65), 65), `Fetched ${items.length}/${totalSupply} items...`);
    if (next) await sleep(250);
  } while (next);
  return items;
}

// ─── Scoring ───
function scoreItem(item, traitCounts, totalSupply, thresholds, points) {
  let totalScore = 0;
  const traitScores = [];
  for (const trait of item.traits) {
    const key = `${trait.type}::${trait.value}`;
    const count = traitCounts[key] || 0;
    const pct = totalSupply > 0 ? (count / totalSupply) * 100 : 0;
    let tier, pts;
    if (pct < thresholds[0]) { tier = 'orange'; pts = points[0]; }
    else if (pct < thresholds[1]) { tier = 'purple'; pts = points[1]; }
    else if (pct < thresholds[2]) { tier = 'blue'; pts = points[2]; }
    else { tier = 'common'; pts = 0; }
    totalScore += pts;
    traitScores.push({ type: trait.type, value: trait.value, count, pct: pct.toFixed(2), tier, points: pts });
  }
  return {
    tokenId: item.tokenId, name: item.name, price: item.price, currency: item.currency || 'ETH',
    rarityRank: item.rarity?.rank, totalSupply, totalScore,
    orangeCount: traitScores.filter(t => t.tier === 'orange').length,
    purpleCount: traitScores.filter(t => t.tier === 'purple').length,
    blueCount: traitScores.filter(t => t.tier === 'blue').length,
    mainTraits: traitScores.filter(t => !t.type.startsWith('_')),
    specialTraits: traitScores.filter(t => t.type.startsWith('_') && t.points > 0)
  };
}

// ─── Sorting ───
function sortResults(field) {
  if (field === currentSort) currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
  else { currentSort = field; currentSortDir = field === 'rarity' ? 'asc' : 'desc'; }
  document.querySelectorAll('.sort-btn[data-sort]').forEach(b => {
    if (b.dataset.sort !== 'toggle') b.classList.toggle('active', b.dataset.sort === field);
  });
  applySorting();
}
function toggleSortDir() { currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc'; applySorting(); }

function applySorting() {
  // Sort cards
  const grid = document.getElementById('resultsGrid');
  const cards = Array.from(grid.querySelectorAll('.item-card'));
  const sortFn = makeSortFn(currentSort, currentSortDir);
  cards.sort((a, b) => sortFn(a.dataset, b.dataset));
  cards.forEach((card, idx) => { grid.appendChild(card); card.querySelector('.item-idx').textContent = '#' + (idx + 1); });

  // Sort table rows
  const tbody = document.querySelector('#resultsTable tbody');
  if (!tbody) return;
  const rowPairs = [];
  const rows = Array.from(tbody.children);
  for (let i = 0; i < rows.length; i += 2) {
    if (rows[i] && rows[i + 1]) rowPairs.push([rows[i], rows[i + 1]]);
  }
  rowPairs.sort((a, b) => sortFn(a[0].dataset, b[0].dataset));
  rowPairs.forEach(([main, expand], idx) => {
    tbody.appendChild(main);
    tbody.appendChild(expand);
    main.querySelector('.tbl-idx').textContent = idx + 1;
  });
}

function makeSortFn(field, dir) {
  return (a, b) => {
    let va, vb;
    switch (field) {
      case 'score': va = +a.score; vb = +b.score; break;
      case 'value': va = +a.value; vb = +b.value; break;
      case 'price': va = +a.price; vb = +b.price; break;
      case 'rarity': va = +a.rarity; vb = +b.rarity; break;
      default: va = +a.score; vb = +b.score;
    }
    return dir === 'desc' ? vb - va : va - vb;
  };
}

// ─── CSV Export ───
function exportCSV() {
  if (scoredItems.length === 0) return;
  const headers = ['Rank', 'Name', 'Token ID', 'Score', 'Value (pts/ETH)', 'Price', 'Currency', 'OS Rarity Rank', 'Orange Traits', 'Purple Traits', 'Blue Traits', 'Is Bargain', 'OpenSea URL'];
  const rows = scoredItems.map((item, idx) => [
    idx + 1, `"${item.name}"`, item.tokenId, item.totalScore,
    item.valueScore ?? '', item.price != null ? formatPrice(item.price) : '',
    item.currency, item.rarityRank || '', item.orangeCount, item.purpleCount, item.blueCount,
    item.isBargain ? 'Yes' : '', `https://opensea.io/assets/${lastChain}/${lastContract}/${item.tokenId}`
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rarity_scores_${parseSlug(document.getElementById('collectionInput').value) || 'export'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Init ───
loadTheme();
loadApiKey();
loadLastCollection();
</script>
